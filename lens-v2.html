<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PX Lens v2</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   PX Lens v2 — Zero-dependency, self-contained
   Design: verdict-first, FAIL > PASS, no crypto shown
   ══════════════════════════════════════════ */

:root {
  /* Pass */
  --pass: #059669;
  --pass-light: #10b981;
  --pass-bg: rgba(16,185,129,0.05);
  --pass-ring: #10b981;
  --pass-border: #6ee7b7;
  --pass-card: #ecfdf5;

  /* Fail */
  --fail: #dc2626;
  --fail-light: #ef4444;
  --fail-bg: rgba(239,68,68,0.04);
  --fail-ring: #ef4444;
  --fail-border: #fca5a5;
  --fail-card: #fef2f2;

  /* Neutral */
  --ink: #111827;
  --ink70: rgba(17,24,39,0.7);
  --ink45: rgba(17,24,39,0.45);
  --ink20: rgba(17,24,39,0.2);
  --ink08: rgba(17,24,39,0.08);
  --ink04: rgba(17,24,39,0.03);
  --bg: #ffffff;
  --surface: #f9fafb;
  --border: #e5e7eb;
  --amber: #d97706;
  --amber-bg: #fffbeb;

  /* Type */
  --fd: 'Instrument Sans', 'Noto Sans JP', system-ui, sans-serif;
  --fm: 'JetBrains Mono', 'SF Mono', monospace;

  /* Radii */
  --r: 16px;
  --rs: 10px;
  --rr: 8px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--fd);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: background-color 0.5s ease;
}
body.verdict-pass { background-color: var(--pass-bg); }
body.verdict-fail { background-color: var(--fail-bg); }

/* ── Layout ── */
.wrap { max-width: 780px; margin: 0 auto; padding: 0 24px; }

/* ── Header ── */
.hd { padding: 14px 0; border-bottom: 1px solid var(--ink08); }
.hd__inner { display: flex; align-items: center; gap: 10px; }
.hd__logo { font-weight: 800; font-size: 15px; letter-spacing: -0.02em; }
.hd__sep { color: var(--ink20); font-weight: 300; }
.hd__badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.hd__badge--pass { background: var(--pass-card); color: var(--pass); }
.hd__badge--fail { background: var(--fail-card); color: var(--fail); }
.hd__badge--draft { background: var(--amber-bg); color: var(--amber); }
.hd__right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.hd__privacy { font-size: 11px; color: var(--ink45); display: flex; align-items: center; gap: 4px; }
.hd__meta { font-size: 12px; color: var(--ink45); font-weight: 500; }
.hd__date { font-size: 11px; color: var(--ink20); }

/* ── Navigation Tabs ── */
.tabs { display: flex; gap: 2px; padding: 12px 0 0; margin-bottom: 0; background: var(--bg); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--ink08); }
.tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--ink45); cursor: pointer; font-family: var(--fd); transition: all 0.15s; }
.tab:hover { color: var(--ink70); }
.tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
.tab .tab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; background: var(--fail-card); color: var(--fail); font-size: 10px; font-weight: 700; border-radius: 9px; margin-left: 5px; }
.tab .tab-count--pass { background: var(--pass-card); color: var(--pass); }

/* ── Screens ── */
.screen { display: none; padding: 32px 0 60px; }
.screen.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ════════════════════════════════════════════
   Screen 1: VERDICT
   ════════════════════════════════════════════ */

/* Progress Ring */
.ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 0 28px; }
.ring { position: relative; width: 160px; height: 160px; animation: ringPulse 0.6s ease 1.4s both; }
@keyframes ringPulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
.ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring__bg { fill: none; stroke: var(--ink08); stroke-width: 8; }
.ring__fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.3s; }
.ring__fg--pass { stroke: var(--pass-ring); }
.ring__fg--fail { stroke: var(--fail-ring); }
.ring__label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.ring__num { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.ring__num--pass { color: var(--pass); }
.ring__num--fail { color: var(--fail); }
.ring__denom { font-size: 16px; color: var(--ink45); font-weight: 500; }
.ring__pct { font-size: 13px; color: var(--ink45); margin-top: 8px; font-weight: 500; }

/* Verdict message */
.verdict-msg { text-align: center; margin-bottom: 32px; }
.verdict-msg__title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.verdict-msg__title--pass { color: var(--pass); }
.verdict-msg__title--fail { color: var(--fail); }
.verdict-msg__sub { font-size: 14px; color: var(--ink45); }

/* Failure list */
.fail-list { margin-bottom: 28px; }
.fail-item { background: var(--fail-card); border: 1px solid var(--fail-border); border-left: 4px solid var(--fail); border-radius: var(--rs); padding: 14px 18px; margin-bottom: 10px; }
.fail-item__id { font-size: 11px; font-weight: 600; color: var(--fail); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.fail-item__id::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--fail); }
.fail-item__text { font-size: 14px; color: var(--ink); line-height: 1.55; }

/* Pass summary */
.pass-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rs); padding: 18px 22px; margin-bottom: 28px; }
.pass-summary__row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.pass-summary__label { font-size: 13px; color: var(--ink45); }
.pass-summary__value { font-size: 14px; font-weight: 600; color: var(--ink); }

/* Action buttons row */
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; font-size: 14px; font-weight: 600; font-family: var(--fd); border: none; border-radius: var(--rs); cursor: pointer; transition: all 0.15s; }
.btn--pass { background: var(--pass); color: #fff; }
.btn--pass:hover { background: #047857; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(5,150,105,0.3); }
.btn--fail { background: var(--fail); color: #fff; }
.btn--fail:hover { background: #b91c1c; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(220,38,38,0.3); }
.btn--ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
.btn--ghost:hover { background: var(--border); }
.btn--copy { background: var(--ink); color: #fff; }
.btn--copy:hover { background: #374151; }
.btn--sm { padding: 8px 16px; font-size: 13px; }
.btn--full { width: 100%; }
.btn--disabled { opacity: 0.4; pointer-events: none; }
.btn--confirming { animation: confirmPulse 0.6s ease infinite; }
@keyframes confirmPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: #fff; padding: 10px 24px; border-radius: var(--rs); font-size: 13px; font-weight: 500; z-index: 999; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* Acceptance confirmation */
.acceptance { background: var(--pass-card); border: 1px solid var(--pass-border); border-radius: var(--rs); padding: 22px; text-align: center; margin-top: 20px; display: none; animation: fadeIn 0.3s ease; }
.acceptance.show { display: block; }
.acceptance__icon { font-size: 32px; margin-bottom: 8px; }
.acceptance__title { font-size: 16px; font-weight: 700; color: var(--pass); margin-bottom: 4px; }
.acceptance__time { font-size: 12px; color: var(--ink45); margin-bottom: 12px; }
.acceptance__note { font-size: 12px; color: var(--ink45); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--pass-border); }
.acceptance__id { font-family: var(--fm); font-size: 11px; color: var(--ink45); margin-top: 4px; }

/* Metadata line */
.meta-line { font-size: 12px; color: var(--ink20); text-align: center; margin-top: 16px; }

/* ════════════════════════════════════════════
   Screen 2: MAPPING (Spotlight Sync)
   ════════════════════════════════════════════ */

.mapping { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.mapping__col { padding: 0; }
.mapping__col--q { border-right: 1px solid var(--border); }
.mapping__header { padding: 10px 18px; background: var(--surface); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink45); border-bottom: 1px solid var(--border); }

.map-item { padding: 14px 18px; border-bottom: 1px solid var(--ink04); cursor: pointer; transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease; }
.map-item:last-child { border-bottom: none; }
.map-item:hover { background: var(--ink04); }
.map-item.spotlight { background: #fff; opacity: 1 !important; }
.map-item.dimmed { opacity: 0.12; }
.map-item__id { font-size: 11px; font-weight: 600; color: var(--ink45); letter-spacing: 0.02em; }
.map-item__desc { font-size: 13px; color: var(--ink); margin-top: 2px; font-weight: 500; }
.map-item__status { margin-top: 4px; font-size: 11px; font-weight: 600; }
.map-item__status--pass { color: var(--pass); }
.map-item__status--fail { color: var(--fail); }

/* Evidence items */
.evi-item { padding: 14px 18px; border-bottom: 1px solid var(--ink04); transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease; }
.evi-item:last-child { border-bottom: none; }
.evi-item.spotlight { background: var(--pass-card); border-left: 3px solid var(--pass); transform: scale(1.015); }
.evi-item.spotlight-fail { background: var(--fail-card); border-left: 3px solid var(--fail); transform: scale(1.015); }
.evi-item.dimmed { opacity: 0.12; }
.evi-item__name { font-size: 13px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.evi-item__name svg { flex-shrink: 0; }
.evi-item__path { font-size: 11px; color: var(--ink45); font-family: var(--fm); margin-top: 2px; }
.evi-item__hash { font-size: 10px; color: var(--ink20); font-family: var(--fm); margin-top: 2px; }
.evi-item__badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-top: 4px; }
.evi-item__badge--pass { background: var(--pass-card); color: var(--pass); }
.evi-item__badge--fail { background: var(--fail-card); color: var(--fail); }

/* File Preview */
.preview { margin-top: -1px; border-top: 1px solid var(--border); background: var(--surface); border-radius: 0 0 var(--rs) var(--rs); overflow: hidden; display: none; }
.preview.show { display: block; animation: slideDown 0.2s ease; }
@keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 300px; } }
.preview__bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px; background: var(--ink04); font-size: 11px; color: var(--ink45); }
.preview__code { padding: 12px 14px; font-family: var(--fm); font-size: 12px; line-height: 1.7; color: var(--ink70); overflow-x: auto; max-height: 240px; overflow-y: auto; white-space: pre-wrap; }
.preview__code .key { color: #0550ae; }
.preview__code .str { color: #0a3069; }
.preview__code .bool { color: #cf222e; }
.preview__code .num { color: #0550ae; }

/* ════════════════════════════════════════════
   Screen 2.5: CHAIN VIEW
   ════════════════════════════════════════════ */

.chain { padding: 8px 0; }
.chain__timeline { display: flex; align-items: center; justify-content: center; gap: 0; padding: 20px 0 32px; overflow-x: auto; }
.chain__node { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 0 8px; transition: transform 0.15s; position: relative; }
.chain__node:hover { transform: scale(1.08); }
.chain__dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--ink20); background: var(--bg); transition: all 0.15s; }
.chain__dot--pass { border-color: var(--pass); background: var(--pass-card); }
.chain__dot--fail { border-color: var(--fail); background: var(--fail-card); }
.chain__dot--current { width: 20px; height: 20px; border-width: 3px; }
.chain__dot--current.chain__dot--pass { background: var(--pass); box-shadow: 0 0 0 4px var(--pass-bg), 0 0 12px rgba(16,185,129,0.3); }
.chain__dot--current.chain__dot--fail { background: var(--fail); box-shadow: 0 0 0 4px var(--fail-bg), 0 0 12px rgba(239,68,68,0.3); }
.chain__date { font-size: 11px; color: var(--ink45); font-weight: 500; white-space: nowrap; }
.chain__line { width: 32px; height: 2px; background: var(--ink08); flex-shrink: 0; margin-bottom: 22px; }
.chain__label { font-size: 10px; font-weight: 600; color: var(--pass); position: absolute; top: -18px; }

.chain__detail { border: 1px solid var(--border); border-radius: var(--rs); margin-bottom: 12px; overflow: hidden; }
.chain__detail-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--surface); cursor: pointer; }
.chain__detail-head:hover { background: var(--ink04); }
.chain__detail-date { font-size: 14px; font-weight: 700; color: var(--ink); }
.chain__detail-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.chain__detail-badge--pass { background: var(--pass-card); color: var(--pass); }
.chain__detail-badge--fail { background: var(--fail-card); color: var(--fail); }
.chain__detail-body { padding: 14px 18px; border-top: 1px solid var(--border); }
.chain__diff { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
.chain__diff-item { font-size: 12px; color: var(--ink45); }
.chain__diff-item strong { color: var(--ink); }
.chain__link { font-size: 12px; color: var(--pass); font-weight: 600; text-decoration: none; }
.chain__link:hover { text-decoration: underline; }

/* ════════════════════════════════════════════
   Screen 3: ADVANCED (crypto quarantine)
   ════════════════════════════════════════════ */

.adv-section { margin-bottom: 20px; }
.adv-section summary { font-size: 13px; font-weight: 600; color: var(--ink45); cursor: pointer; padding: 12px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
.adv-section summary::before { content: '+'; display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 4px; background: var(--ink04); font-size: 14px; font-weight: 700; color: var(--ink45); transition: all 0.15s; }
.adv-section[open] summary::before { content: '\2212'; background: var(--ink08); }
.adv-section summary:hover { color: var(--ink); }
.adv-field { padding: 8px 0; border-bottom: 1px solid var(--ink04); display: flex; }
.adv-field:last-child { border-bottom: none; }
.adv-field__label { width: 180px; flex-shrink: 0; font-size: 12px; font-weight: 500; color: var(--ink45); padding-top: 2px; }
.adv-field__value { font-size: 13px; font-family: var(--fm); color: var(--ink70); word-break: break-all; }
.adv-json { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rr); padding: 16px; font-family: var(--fm); font-size: 11px; line-height: 1.7; overflow-x: auto; max-height: 400px; overflow-y: auto; color: var(--ink70); white-space: pre-wrap; margin-top: 12px; }

/* ════════════════════════════════════════════
   Pull 導線
   ════════════════════════════════════════════ */

.pull-cta { text-align: center; padding: 24px 0; margin-top: 20px; border-top: 1px solid var(--ink04); }
.pull-cta__text { font-size: 12px; color: var(--ink20); }
.pull-cta__text a { color: var(--ink45); text-decoration: none; font-weight: 600; }
.pull-cta__text a:hover { color: var(--pass); }

/* ════════════════════════════════════════════
   Footer
   ════════════════════════════════════════════ */

.ft { padding: 20px 0; border-top: 1px solid var(--ink08); margin-top: 40px; }
.ft__inner { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--ink20); }

/* ════════════════════════════════════════════
   Responsive
   ════════════════════════════════════════════ */

@media (max-width: 640px) {
  .wrap { padding: 0 16px; }
  .mapping { grid-template-columns: 1fr; }
  .mapping__col--q { border-right: none; border-bottom: 1px solid var(--border); }
  .ring { width: 130px; height: 130px; }
  .ring__num { font-size: 32px; }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { white-space: nowrap; padding: 10px 14px; }
  .actions { flex-direction: column; }
  .btn { width: 100%; }
  .chain__timeline { justify-content: flex-start; padding-left: 16px; }
}

/* ════════════════════════════════════════════
   Print
   ════════════════════════════════════════════ */

@media print {
  body { background: #fff !important; }
  .tabs, .hd__right, .actions, .pull-cta, .ft, .toast { display: none !important; }
  .screen { display: block !important; page-break-inside: avoid; }
  .screen:first-of-type { page-break-before: avoid; }
  .ring__fg { stroke-dashoffset: 0 !important; }
  .ring { animation: none !important; }
  .map-item, .evi-item { opacity: 1 !important; }
  .preview { display: block !important; }
}
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="hd">
  <div class="wrap">
    <div class="hd__inner">
      <span class="hd__logo">PX</span>
      <span class="hd__sep">|</span>
      <span style="font-size:14px;color:var(--ink45);font-weight:500">Lens</span>
      <span class="hd__badge" id="hd-badge">--</span>
      <div class="hd__right">
        <span class="hd__meta" id="hd-meta"></span>
        <span class="hd__date" id="hd-date"></span>
        <span class="hd__privacy">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 1L2 4v4c0 3.3 2.6 6.4 6 7 3.4-.6 6-3.7 6-7V4L8 1z" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
          Offline
        </span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ Tab Navigation ═══ -->
<div class="wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-screen="verdict">Verdict</button>
    <button class="tab" data-screen="mapping">Mapping</button>
    <button class="tab" data-screen="chain" id="tab-chain" style="display:none">Chain</button>
    <button class="tab" data-screen="advanced">Advanced</button>
  </div>
</div>

<!-- ═══ Screen 1: Verdict ═══ -->
<div class="wrap">
  <div class="screen active" id="screen-verdict">

    <!-- Progress Ring -->
    <div class="ring-wrap">
      <div class="ring">
        <svg viewBox="0 0 160 160">
          <circle class="ring__bg" cx="80" cy="80" r="68"/>
          <circle class="ring__fg" id="ring-fg" cx="80" cy="80" r="68"
            stroke-dasharray="427.26"
            stroke-dashoffset="427.26"/>
        </svg>
        <div class="ring__label">
          <div class="ring__num" id="ring-num">--</div>
          <div class="ring__denom" id="ring-denom">--</div>
        </div>
      </div>
      <div class="ring__pct" id="ring-pct"></div>
    </div>

    <!-- Verdict Message -->
    <div class="verdict-msg">
      <div class="verdict-msg__title" id="verdict-title"></div>
      <div class="verdict-msg__sub" id="verdict-sub"></div>
    </div>

    <!-- Fail List (FAIL only) -->
    <div class="fail-list" id="fail-list"></div>

    <!-- Pass Summary (PASS only) -->
    <div class="pass-summary" id="pass-summary" style="display:none">
      <div class="pass-summary__row">
        <span class="pass-summary__label">Files</span>
        <span class="pass-summary__value" id="ps-files">--</span>
      </div>
      <div class="pass-summary__row">
        <span class="pass-summary__label">Rules</span>
        <span class="pass-summary__value" id="ps-rules">--</span>
      </div>
      <div class="pass-summary__row">
        <span class="pass-summary__label">Profile</span>
        <span class="pass-summary__value" id="ps-profile">--</span>
      </div>
      <div class="pass-summary__row">
        <span class="pass-summary__label">Created</span>
        <span class="pass-summary__value" id="ps-created">--</span>
      </div>
    </div>

    <!-- Action Buttons -->
    <div id="verdict-actions"></div>

    <!-- Acceptance confirmation (hidden by default) -->
    <div class="acceptance" id="acceptance">
      <div class="acceptance__icon">&#10003;</div>
      <div class="acceptance__title" id="acc-title">Accepted</div>
      <div class="acceptance__time" id="acc-time"></div>
      <div class="acceptance__note">This acceptance record is tamper-evident.</div>
      <div class="acceptance__id" id="acc-id"></div>
    </div>

    <div class="meta-line" id="meta-line"></div>
  </div>

  <!-- ═══ Screen 2: Mapping (Spotlight Sync) ═══ -->

// ══════════════════════════════════════════
// VERIFICATION ENGINE (zero-dependency)
// ══════════════════════════════════════════

function resolvePath(obj, dotPath) {
  var segs = dotPath.split('.');
  var cur = obj;
  for (var i = 0; i < segs.length; i++) {
    if (cur === null || cur === undefined || typeof cur !== 'object') return undefined;
    cur = cur[segs[i]];
  }
  return cur;
}

function verifyRule(value, rule) {
  if (value === undefined || value === null) return {pass: false, reason: 'file_not_found: ' + rule.path};
  var op = rule.operator || 'eq';
  if (op === 'eq') return value === rule.expected ? {pass:true,reason:'ok'} : {pass:false,reason:'got '+JSON.stringify(value)+', expected '+JSON.stringify(rule.expected)};
  if (op === 'gte') return (typeof value === 'number' && value >= rule.expected) ? {pass:true,reason:'ok'} : {pass:false,reason:'value '+value+' below minimum '+rule.expected};
  if (op === 'lte') return (typeof value === 'number' && value <= rule.expected) ? {pass:true,reason:'ok'} : {pass:false,reason:'value '+value+' exceeds maximum '+rule.expected};
  return {pass:false,reason:'unknown operator: '+op};
}

function runVerify(profile, evidence) {
  var results = [];
  for (var i = 0; i < profile.rules.length; i++) {
    var rule = profile.rules[i];
    var value = resolvePath(evidence, rule.path);
    var check = verifyRule(value, rule);
    results.push({id:rule.id, description:rule.description||'', pass:check.pass, reason:check.reason, path:rule.path, expected:rule.expected, got:value});
  }
  return results;
}

// ══════════════════════════════════════════
// FAIL REASON TRANSLATOR
// Plain text, no crypto jargon
// ══════════════════════════════════════════

var FAIL_TRANSLATIONS = {
  'ja': {
    'file_not_found': function(ctx) { return ctx.file + ' が見つかりません。パックに含まれていません。'; },
    'exceeds_maximum': function(ctx) { return ctx.field_label + 'が' + ctx.got + '件あります。ルール上は' + ctx.expected + '件以下が必要です。'; },
    'below_minimum': function(ctx) { return ctx.field_label + 'が' + ctx.got + 'です。ルール上は' + ctx.expected + '以上が必要です。'; },
    'mismatch': function(ctx) { return ctx.field_label + 'の値が期待と異なります（現在: ' + ctx.got + '、期待: ' + ctx.expected + '）。'; },
    'hash_mismatch': function(ctx) { return ctx.file + ' が封印時から変更されています。元のファイルで再作成が必要です。'; }
  }
};

var FIELD_LABELS = {
  'patch_status.outstanding_critical': '未適用の重大パッチ',
  'firewall_log': 'ファイアウォールログ',
  'iam.mfa_enabled': 'MFA（多要素認証）',
  'iam.root_access_key_active': 'ルートアクセスキー',
  'iam.password_policy.minimum_length': 'パスワード最小長',
  'rds.storage_encrypted': 'RDS暗号化',
  'rds.publicly_accessible': 'RDSパブリックアクセス',
  's3.public_access_blocked': 'S3パブリックアクセスブロック',
  's3.versioning': 'S3バージョニング',
  'cloudtrail.is_logging': 'CloudTrailロギング',
  'cloudtrail.is_multi_region': 'CloudTrailマルチリージョン',
  'vpc.flow_logs_enabled': 'VPCフローログ'
};

function translateFail(result) {
  var reason = result.reason || '';
  var path = result.path || '';
  var label = FIELD_LABELS[path] || path;
  var t = FAIL_TRANSLATIONS['ja'];

  if (reason.indexOf('file_not_found') === 0) {
    var file = reason.replace('file_not_found: ', '').replace(path, path.replace(/\./g, '-') + '.json');
    return t['file_not_found']({file: file});
  }
  if (reason.indexOf('exceeds maximum') !== -1) {
    return t['exceeds_maximum']({field_label: label, got: result.got, expected: result.expected});
  }
  if (reason.indexOf('below minimum') !== -1) {
    return t['below_minimum']({field_label: label, got: result.got, expected: result.expected});
  }
  if (reason.indexOf('hash_mismatch') !== -1) {
    return t['hash_mismatch']({file: path});
  }
  // fallback: human-readable version
  return label + ': ' + reason;
}

// ══════════════════════════════════════════
// UI RENDERING

function esc(s) { var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

// #2: Counter animation (easeOutCubic)
function animateCounter(el, target, duration) {
  var start = performance.now();
  function tick(now) {
    var t = Math.min((now - start) / duration, 1);
    var ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(target * ease);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function formatDate(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function shortDate(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  return (d.getMonth()+1) + '/' + String(d.getDate()).padStart(2,'0');
}

document.addEventListener('DOMContentLoaded', function() {

  // ── Compute results ──
  var results = STORED_RESULTS || runVerify(PROFILE, EVIDENCE);
  var passCount = results.filter(function(r) { return r.pass; }).length;
  var totalCount = results.length;
  var allPass = passCount === totalCount;
  var failResults = results.filter(function(r) { return !r.pass; });
  var pct = totalCount > 0 ? Math.round((passCount / totalCount) * 1000) / 10 : 0;

  // ── Body background ──
  document.body.classList.add(allPass ? 'verdict-pass' : 'verdict-fail');

  // ── Header badge ──
  var badge = document.getElementById('hd-badge');
  if (allPass) {
    badge.className = 'hd__badge hd__badge--pass';
    badge.textContent = 'PASS';
  } else {
    badge.className = 'hd__badge hd__badge--fail';
    badge.textContent = failResults.length + ' FAIL';
  }

  // ── Header meta (sender info) ──
  var metaEl = document.getElementById('hd-meta');
  var dateEl = document.getElementById('hd-date');

    var parts = [];
    if (MANIFEST.project) parts.push(MANIFEST.project);
    if (MANIFEST.framework) parts.push(MANIFEST.framework);
    metaEl.textContent = parts.join(' / ') || '';
  }
  if (dateEl && MANIFEST.created_at) {
    dateEl.textContent = MANIFEST.created_at.split('T')[0];
  }

  // ── Progress Ring Animation ──
  var circumference = 2 * Math.PI * 68; // r=68
  var fg = document.getElementById('ring-fg');
  var offset = circumference - (passCount / totalCount) * circumference;
  fg.classList.add(allPass ? 'ring__fg--pass' : 'ring__fg--fail');
  // trigger animation
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      fg.style.strokeDashoffset = offset;
    });
  });

  var numEl = document.getElementById('ring-num');
  numEl.classList.add(allPass ? 'ring__num--pass' : 'ring__num--fail');
  animateCounter(numEl, passCount, 800);
  document.getElementById('ring-denom').textContent = '/ ' + totalCount;
  document.getElementById('ring-pct').textContent = pct + '% compatible';

  // ── Verdict message ──
  var vTitle = document.getElementById('verdict-title');
  var vSub = document.getElementById('verdict-sub');
  if (allPass) {
    vTitle.textContent = 'This submission pack is consistent';
    vTitle.classList.add('verdict-msg__title--pass');
    vSub.textContent = 'No changes since sealing';
  } else {
    vTitle.textContent = 'This submission pack has issues';
    vTitle.classList.add('verdict-msg__title--fail');
    vSub.textContent = failResults.length + ' inconsistencies found';
  }

  // ── Fail list (FAIL only) ──
  var failList = document.getElementById('fail-list');
  if (!allPass) {
    var html = '';
    for (var i = 0; i < failResults.length; i++) {
      var fr = failResults[i];
      html += '<div class="fail-item">';
      html += '<div class="fail-item__id">' + esc(fr.id) + '</div>';
      html += '<div class="fail-item__text">' + esc(translateFail(fr)) + '</div>';
      html += '</div>';
    }
    failList.innerHTML = html;
  } else {
    failList.style.display = 'none';
  }

  // ── Pass summary (PASS only) ──
  if (allPass) {
    document.getElementById('pass-summary').style.display = 'block';
    document.getElementById('ps-files').textContent = (MANIFEST.evidence_summary.total || 1) + ' matched';
    document.getElementById('ps-rules').textContent = passCount + '/' + totalCount + ' conforming';
    document.getElementById('ps-profile').textContent = (PROFILE.name || PROFILE.profile_id) + ' v' + (PROFILE.profile_version || '');
    document.getElementById('ps-created').textContent = formatDate(MANIFEST.created_at);
  }

  // ── Action buttons ──
  var actionsEl = document.getElementById('verdict-actions');
  var actHtml = '<div class="actions">';
  if (allPass) {
    actHtml += '<button class="btn btn--pass" id="btn-accept">Accept</button>';
    actHtml += '<button class="btn btn--ghost" onclick="switchTab(\'mapping\')">View contents</button>';
  } else {
    actHtml += '<button class="btn btn--copy" id="btn-copy-fix">Copy fix request</button>';
    actHtml += '<button class="btn btn--ghost" onclick="switchTab(\'mapping\')">View details</button>';
  }
  actHtml += '</div>';
  actionsEl.innerHTML = actHtml;

  // Red Phone: copy fix request
  var copyBtn = document.getElementById('btn-copy-fix');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      var text = 'PX verification result: ' + failResults.length + ' inconsistencies detected.\n';
      for (var i = 0; i < failResults.length; i++) {
        text += ' - ' + failResults[i].id + ': ' + translateFail(failResults[i]) + '\n';
      }
      text += 'Please regenerate and resend the pack after fixing.';
      navigator.clipboard.writeText(text).then(function() {
        showToast('\u2713 Copied');
      });
    });
  }

  // Accept button (2-step confirmation)
  var acceptBtn = document.getElementById('btn-accept');
  var confirmTimer = null;
  function doAccept() {
    clearTimeout(confirmTimer);
    var now = new Date();
    var receiptId = 'ar-' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '-' + Math.random().toString(36).substr(2,4);
    var receipt = {
      type: 'acceptance_receipt',
      manifest_ref: MANIFEST.manifest_ref,
      accepted_at: now.toISOString(),
      receipt_id: receiptId,
      verdict: allPass ? 'PASS' : 'FAIL_EXCEPTION'
    };
    var acc = document.getElementById('acceptance');
    document.getElementById('acc-title').textContent = 'Accepted';
    document.getElementById('acc-time').textContent = formatDate(now.toISOString());
    document.getElementById('acc-id').textContent = 'Receipt ID: ' + receiptId;
    acc.classList.add('show');
    acceptBtn.classList.add('btn--disabled');
    acceptBtn.classList.remove('btn--confirming');
    acceptBtn.textContent = '\u2713 Accepted';
    var blob = new Blob([JSON.stringify(receipt, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'acceptance-receipt-' + receiptId + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('\u2713 Acceptance receipt downloaded');
  }
  if (acceptBtn) {
    acceptBtn.addEventListener('click', function() {
      if (acceptBtn.dataset.confirming === 'true') {
        doAccept();
        return;
      }
      acceptBtn.dataset.confirming = 'true';
      acceptBtn.textContent = 'Confirm acceptance?';
      acceptBtn.classList.add('btn--confirming');
      confirmTimer = setTimeout(function() {
        acceptBtn.dataset.confirming = 'false';
        acceptBtn.textContent = 'Accept';
        acceptBtn.classList.remove('btn--confirming');
      }, 3000);
    });
  }

  // Meta line
  document.getElementById('meta-line').textContent = 'Generated by ' + esc(MANIFEST.generator || 'px-cli') + ' on ' + formatDate(MANIFEST.created_at);

  // Pull CTA always visible
  document.getElementById('pull-cta').style.display = 'block';

  // ══════════════════════════════════════════
  // Screen 2: MAPPING (Spotlight Sync)
  // ══════════════════════════════════════════

  var mappingGrid = document.getElementById('mapping-grid');
  var qHtml = '<div class="mapping__col mapping__col--q"><div class="mapping__header">Rules</div>';
  var eHtml = '<div class="mapping__col mapping__col--e"><div class="mapping__header">Evidence</div>';

  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var eid = 'evi-' + i;
    qHtml += '<div class="map-item" data-evi="' + eid + '" data-idx="' + i + '">';
    qHtml += '<div class="map-item__id">' + esc(r.id) + '</div>';
    qHtml += '<div class="map-item__desc">' + esc(r.description) + '</div>';
    qHtml += '<div class="map-item__status map-item__status--' + (r.pass ? 'pass' : 'fail') + '">' + (r.pass ? 'PASS' : 'FAIL') + '</div>';
    qHtml += '</div>';

    eHtml += '<div class="evi-item" id="' + eid + '" data-idx="' + i + '">';
    eHtml += '<div class="evi-item__name">';
    eHtml += '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 1h5l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M9 1v4h4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>';
    eHtml += esc(r.path.replace(/\./g, '/'));
    eHtml += '</div>';
    eHtml += '<div class="evi-item__path">' + esc(r.path) + ' = ' + esc(JSON.stringify(r.got)) + '</div>';
    var badgeClass = r.pass ? 'evi-item__badge--pass' : 'evi-item__badge--fail';
    eHtml += '<div class="evi-item__badge ' + badgeClass + '">' + (r.pass ? 'MATCH' : 'MISMATCH') + '</div>';
    eHtml += '</div>';
  }

  qHtml += '</div>';
  eHtml += '</div>';
  mappingGrid.innerHTML = qHtml + eHtml;

  // Spotlight Sync: hover/click on question highlights evidence
  var qItems = mappingGrid.querySelectorAll('.map-item');
  var eItems = mappingGrid.querySelectorAll('.evi-item');
  var allItems = mappingGrid.querySelectorAll('.map-item, .evi-item');

  function clearSpotlight() {
    for (var j = 0; j < allItems.length; j++) {
      allItems[j].classList.remove('spotlight', 'spotlight-fail', 'dimmed');
    }
  }

  function spotlight(idx) {
    var r = results[idx];
    for (var j = 0; j < allItems.length; j++) {
      allItems[j].classList.add('dimmed');
      allItems[j].classList.remove('spotlight', 'spotlight-fail');
    }
    var qi = mappingGrid.querySelector('.map-item[data-idx="' + idx + '"]');
    var ei = document.getElementById('evi-' + idx);
    if (qi) { qi.classList.remove('dimmed'); qi.classList.add('spotlight'); }
    if (ei) { ei.classList.remove('dimmed'); ei.classList.add(r.pass ? 'spotlight' : 'spotlight-fail'); }
  }

  for (var i = 0; i < qItems.length; i++) {
    (function(item) {
      item.addEventListener('mouseenter', function() { spotlight(parseInt(item.getAttribute('data-idx'))); });
      item.addEventListener('mouseleave', clearSpotlight);
    })(qItems[i]);
  }
  for (var i = 0; i < eItems.length; i++) {
    (function(item) {
      item.addEventListener('mouseenter', function() { spotlight(parseInt(item.getAttribute('data-idx'))); });
      item.addEventListener('mouseleave', clearSpotlight);
    })(eItems[i]);
  }

  // ── Fail count badge on Mapping tab ──

  // ══════════════════════════════════════════

  // ══════════════════════════════════════════

  var parentRefs = MANIFEST.parent_manifest_refs || [];
  if (parentRefs.length > 0) {

    chainNodes.push({
      ref: MANIFEST.manifest_ref,
      date: MANIFEST.created_at.split('T')[0],

    for (var i = 0; i < chainNodes.length; i++) {
      var cn = chainNodes[i];
      var dotClass = 'chain__dot';
      dotClass += cn.pass ? ' chain__dot--pass' : ' chain__dot--fail';
      if (cn.current) dotClass += ' chain__dot--current';

      cHtml += '<div class="chain__node" data-chain-idx="' + i + '">';
      if (cn.current) cHtml += '<span class="chain__label">Current</span>';
      cHtml += '<div class="' + dotClass + '"></div>';
      cHtml += '<div class="chain__date">' + shortDate(cn.date) + '</div>';
      cHtml += '</div>';

      if (i < chainNodes.length - 1) {
        cHtml += '<div class="chain__line"></div>';
      }
    }
    cHtml += '</div>';

    // Details for each node (reverse order: newest first)
    for (var i = chainNodes.length - 1; i >= 0; i--) {
      var cn = chainNodes[i];
      var badgeClass = cn.pass ? 'chain__detail-badge--pass' : 'chain__detail-badge--fail';
      cHtml += '<div class="chain__detail">';
      cHtml += '<div class="chain__detail-head">';
      cHtml += '<span class="chain__detail-date">' + esc(cn.date) + (cn.current ? ' (current)' : '') + '</span>';
      cHtml += '<span class="chain__detail-badge ' + badgeClass + '">' + esc(cn.score) + ' ' + (cn.pass ? 'PASS' : 'FAIL') + '</span>';
      cHtml += '</div>';
      if (cn.changed !== undefined) {
        cHtml += '<div class="chain__detail-body">';
        cHtml += '<div class="chain__diff">';
        if (cn.changed > 0) cHtml += '<div class="chain__diff-item"><strong>' + cn.changed + '</strong> updated</div>';
        if (cn.added > 0) cHtml += '<div class="chain__diff-item"><strong>' + cn.added + '</strong> added</div>';
        if (cn.removed > 0) cHtml += '<div class="chain__diff-item"><strong>' + cn.removed + '</strong> removed</div>';
        if (cn.unchanged > 0) cHtml += '<div class="chain__diff-item">' + cn.unchanged + ' unchanged</div>';
        cHtml += '</div>';
        if (!cn.current) cHtml += '<a class="chain__link" href="#">Open this pack &rarr;</a>';
        cHtml += '</div>';
      }
      cHtml += '</div>';
    }

    chainEl.innerHTML = cHtml;
  }

  // ══════════════════════════════════════════
  // Screen 3: ADVANCED
  // ══════════════════════════════════════════

  var advFields = document.getElementById('adv-fields');
  var fields = [
    ['manifest_ref', MANIFEST.manifest_ref],
    ['packet_hash', MANIFEST.packet_hash],
    ['seal', MANIFEST.seal],
    ['created_at', MANIFEST.created_at],
    ['generator', MANIFEST.generator],
    ['verification_mode', MANIFEST.verification_mode],
    ['submission_state', MANIFEST.submission_state],
    ['submission_id', String(MANIFEST.submission_id)],
    ['sct', String(MANIFEST.sct)],
    ['acceptance_receipt', String(MANIFEST.acceptance_receipt)],
    ['recipient_binding', String(MANIFEST.recipient_binding)]
  ];
  var fHtml = '';
  for (var i = 0; i < fields.length; i++) {
    fHtml += '<div class="adv-field"><div class="adv-field__label">' + esc(fields[i][0]) + '</div><div class="adv-field__value">' + esc(fields[i][1]) + '</div></div>';
  }
  advFields.innerHTML = fHtml;
  document.getElementById('adv-json').textContent = JSON.stringify(MANIFEST, null, 2);

  // ══════════════════════════════════════════
  // TAB SWITCHING
  // ══════════════════════════════════════════

  var tabs = document.querySelectorAll('.tab');
  var screens = document.querySelectorAll('.screen');

  window.switchTab = function(name) {
    for (var j = 0; j < tabs.length; j++) {
      tabs[j].classList.toggle('active', tabs[j].getAttribute('data-screen') === name);
    }
    for (var j = 0; j < screens.length; j++) {
      screens[j].classList.toggle('active', screens[j].id === 'screen-' + name);
    }
  };

  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function() {
      switchTab(this.getAttribute('data-screen'));
    });
  }

  // ── Browser recompute verification ──
  if (STORED_RESULTS) {
    var recomputed = runVerify(PROFILE, EVIDENCE);
    var match = recomputed.length === STORED_RESULTS.length;
    if (match) {
      for (var i = 0; i < recomputed.length; i++) {
        if (recomputed[i].pass !== STORED_RESULTS[i].pass) { match = false; break; }
      }
    }
    if (!match) {
      showToast('\u26A0 Warning: Recompute mismatch detected');
    }
  }

  // ══════════════════════════════════════════
  // KEYBOARD NAVIGATION
  // ══════════════════════════════════════════

  var currentScreen = 'verdict';
  var highlightIdx = -1;
  var origSwitchTab = window.switchTab;
  window.switchTab = function(name) {
    currentScreen = name;
    highlightIdx = -1;
    origSwitchTab(name);
  };

  document.addEventListener('keydown', function(e) {
    // Ignore if user is typing in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    // 1-4: tab switching
    if (e.key >= '1' && e.key <= '4') {
      var visibleTabs = [];
      var allTabs = document.querySelectorAll('.tab');
      for (var j = 0; j < allTabs.length; j++) {
        if (allTabs[j].offsetParent !== null) visibleTabs.push(allTabs[j]);
      }
      var idx = parseInt(e.key) - 1;
      if (visibleTabs[idx]) {
        visibleTabs[idx].click();
        e.preventDefault();
      }
    }

    // Arrow keys: navigate mapping items
    if (currentScreen === 'mapping') {
      var mapItems = document.querySelectorAll('.map-item');
      if (e.key === 'ArrowDown' || e.key === 'j') {
        highlightIdx = Math.min(highlightIdx + 1, mapItems.length - 1);
        spotlight(highlightIdx);
        mapItems[highlightIdx].scrollIntoView({block:'nearest'});
        e.preventDefault();
      }
      if (e.key === 'ArrowUp' || e.key === 'k') {
        highlightIdx = Math.max(highlightIdx - 1, 0);
        spotlight(highlightIdx);
        mapItems[highlightIdx].scrollIntoView({block:'nearest'});
        e.preventDefault();
      }
    }

    // Escape: clear highlight
    if (e.key === 'Escape') {
      clearSpotlight();
      highlightIdx = -1;
    }
  });
});
</script>
</body>
</html>
